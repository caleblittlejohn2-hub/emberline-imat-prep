<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IMAT Prep — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#03060e;--deep:#060c1a;--surface:rgba(255,255,255,0.032);
  --glass:rgba(6,12,26,0.82);--border:rgba(255,255,255,0.07);
  --t1:#FFFFFF;--t2:#DCE8F8;--t3:#8BA8C8;--t4:rgba(139,168,200,0.5);
  --teal:#0BBFB8;--teal-l:#40DDD6;--teal-border:rgba(11,191,184,0.25);
  --sky:#38A8E8;--gold:#D4A83C;--ember:#E8622A;--sapphire:#4A6FA5;
}
html,body{height:100%;background:var(--void);color:var(--t2);font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;cursor:none;overflow:hidden}
#cosmos{position:fixed;inset:0;z-index:0;pointer-events:none}
#cdot{position:fixed;z-index:9999;width:5px;height:5px;background:var(--teal);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%)}
#cring{position:fixed;z-index:9998;width:28px;height:28px;border:1px solid rgba(11,191,184,0.42);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);transition:width .2s,height .2s}

.auth-shell{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.auth-card{background:var(--glass);border:1px solid var(--border);border-radius:4px;backdrop-filter:blur(24px);padding:2.5rem;width:100%;max-width:420px;position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--teal),transparent)}

.brand{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--t1);text-align:center;margin-bottom:.25rem}
.brand span{color:var(--teal)}
.brand-sub{font-family:'DM Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.12em;color:var(--t4);text-align:center;margin-bottom:2rem}

.tab-row{display:flex;gap:0;border:1px solid var(--border);border-radius:3px;margin-bottom:1.75rem;overflow:hidden}
.tab{flex:1;padding:.55rem;font-size:.8rem;background:transparent;border:none;color:var(--t3);transition:all .2s;text-align:center}
.tab.active{background:rgba(11,191,184,0.1);color:var(--teal)}

.form-group{margin-bottom:1rem}
.form-group label{display:block;font-family:'DM Mono',monospace;font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--t4);margin-bottom:.35rem}
.form-group input{width:100%;background:rgba(6,12,26,0.7);border:1px solid var(--border);border-radius:3px;padding:.65rem .85rem;font-size:.88rem;color:var(--t2);outline:none;transition:border-color .2s;font-family:'Outfit',sans-serif;cursor:none}
.form-group input:focus{border-color:var(--teal-border)}
.form-group input::placeholder{color:var(--t4)}

.btn-full{width:100%;padding:.75rem;border-radius:3px;font-size:.88rem;font-weight:600;border:none;background:var(--teal);color:#000;transition:background .2s;font-family:'Outfit',sans-serif;cursor:none;display:block;text-align:center}
.btn-full:hover{background:var(--teal-l)}

.auth-footer{text-align:center;margin-top:1.25rem;font-size:.78rem;color:var(--t4)}
.auth-footer a{color:var(--teal);text-decoration:underline}

.msg{padding:.65rem .85rem;border-radius:3px;font-size:.8rem;margin-bottom:1rem;display:none}
.msg.error{background:rgba(232,98,42,0.08);border:1px solid rgba(232,98,42,0.3);color:var(--ember)}
.msg.success{background:rgba(11,191,184,0.08);border:1px solid var(--teal-border);color:var(--teal)}
.msg.visible{display:block}

.divider{display:flex;align-items:center;gap:.75rem;margin:1.25rem 0;color:var(--t4);font-size:.72rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>
<canvas id="cosmos"></canvas>
<div id="cdot"></div>
<div id="cring"></div>

<div class="auth-shell">
  <div class="auth-card">
    <div class="brand">IMAT<span>Prep</span></div>
    <div class="brand-sub">Emberline Education</div>

    <div class="tab-row">
      <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <div id="msg" class="msg"></div>

    <!-- SIGN IN -->
    <div id="form-signin">
      <div class="form-group">
        <label>Email</label>
        <input id="si-email" type="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="si-pass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')signIn()">
      </div>
      <button class="btn-full" onclick="signIn()" id="si-btn">Sign In →</button>
      <div class="auth-footer"><a href="#" onclick="switchTab('reset')">Forgot password?</a></div>
    </div>

    <!-- SIGN UP -->
    <div id="form-signup" style="display:none">
      <div class="form-group">
        <label>Full Name</label>
        <input id="su-name" type="text" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="su-email" type="email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input id="su-pass" type="password" placeholder="Min 8 characters" autocomplete="new-password" onkeydown="if(event.key==='Enter')signUp()">
      </div>
      <button class="btn-full" onclick="signUp()" id="su-btn">Create Account →</button>
      <div class="auth-footer">By signing up you agree to our <a href="#">Terms</a></div>
    </div>

    <!-- PASSWORD RESET -->
    <div id="form-reset" style="display:none">
      <div class="form-group">
        <label>Email</label>
        <input id="r-email" type="email" placeholder="your@email.com">
      </div>
      <button class="btn-full" onclick="resetPassword()" id="r-btn">Send Reset Link →</button>
      <div class="auth-footer"><a href="#" onclick="switchTab('signin')">Back to sign in</a></div>
    </div>
  </div>
</div>

<script>
const SB_URL='https://rqytpqaswofdwhmsaykn.supabase.co';
const SB_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJxeXRwcWFzd29mZHdobXNheWtuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MTU5MzksImV4cCI6MjA4ODQ5MTkzOX0.vzsT4oWSxKoWzfDmw7SaCaImA6_SshYwuLA9_nmNHtg';
const sb=supabase.createClient(SB_URL,SB_ANON);

// Check existing session
sb.auth.getSession().then(({data:{session}})=>{if(session)window.location.href='imat-app.html';});

function switchTab(tab){
  ['signin','signup','reset'].forEach(t=>{
    document.getElementById('form-'+t).style.display='none';
    const btn=document.getElementById('tab-'+t);
    if(btn)btn.classList.remove('active');
  });
  document.getElementById('form-'+tab).style.display='block';
  const btn=document.getElementById('tab-'+tab);
  if(btn)btn.classList.add('active');
  hideMsg();
}

function showMsg(text,type='error'){
  const el=document.getElementById('msg');
  el.textContent=text;el.className='msg '+type+' visible';
}
function hideMsg(){document.getElementById('msg').className='msg';}

async function signIn(){
  const email=document.getElementById('si-email').value.trim();
  const pass=document.getElementById('si-pass').value;
  if(!email||!pass){showMsg('Email and password required.');return;}
  const btn=document.getElementById('si-btn');
  btn.textContent='Signing in…';btn.disabled=true;
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){showMsg(error.message);btn.textContent='Sign In →';btn.disabled=false;return;}
  await new Promise(r=>setTimeout(r,300));
  window.location.href='imat-app.html';
}

async function signUp(){
  const name=document.getElementById('su-name').value.trim();
  const email=document.getElementById('su-email').value.trim();
  const pass=document.getElementById('su-pass').value;
  if(!email||!pass){showMsg('Email and password required.');return;}
  if(pass.length<8){showMsg('Password must be at least 8 characters.');return;}
  const btn=document.getElementById('su-btn');
  btn.textContent='Creating account…';btn.disabled=true;
  const{error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  if(error){showMsg(error.message);btn.textContent='Create Account →';btn.disabled=false;return;}
  // Create imat_profile
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    await sb.from('imat_profiles').upsert({id:session.user.id,email,full_name:name},{onConflict:'id'});
    await new Promise(r=>setTimeout(r,300));
    window.location.href='imat-app.html';
  } else {
    showMsg('Check your email to confirm your account, then sign in.','success');
    btn.textContent='Create Account →';btn.disabled=false;
  }
}

async function resetPassword(){
  const email=document.getElementById('r-email').value.trim();
  if(!email){showMsg('Email required.');return;}
  const btn=document.getElementById('r-btn');
  btn.textContent='Sending…';btn.disabled=true;
  const{error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:'https://imat.emberlineworld.com/imat-auth.html'});
  if(error){showMsg(error.message);btn.textContent='Send Reset Link →';btn.disabled=false;return;}
  showMsg('Reset link sent — check your email.','success');
  btn.textContent='Send Reset Link →';btn.disabled=false;
}

/* THREE.JS */
(function(){
  const canvas=document.getElementById('cosmos');
  const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setClearColor(0x000000,0);
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(58,window.innerWidth/window.innerHeight,.1,400);
  camera.position.z=8;
  function mkStars(n,spread,sMin,sMax,hex,op){
    const g=new THREE.BufferGeometry();
    const p=new Float32Array(n*3),s=new Float32Array(n);
    for(let i=0;i<n;i++){
      const th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
      const r=Math.cbrt(Math.random())*spread;
      p[i*3]=r*Math.sin(ph)*Math.cos(th);p[i*3+1]=r*Math.sin(ph)*Math.sin(th);p[i*3+2]=(Math.random()-.5)*spread*.2;
      s[i]=Math.random()*(sMax-sMin)+sMin;
    }
    g.setAttribute('position',new THREE.BufferAttribute(p,3));
    g.setAttribute('size',new THREE.BufferAttribute(s,1));
    return new THREE.Points(g,new THREE.ShaderMaterial({transparent:true,
      uniforms:{col:{value:new THREE.Color(hex)},op:{value:op}},
      vertexShader:`attribute float size;void main(){vec4 mv=modelViewMatrix*vec4(position,1.);float d=clamp(-mv.z,.5,200.);gl_PointSize=size*(275./d);gl_Position=projectionMatrix*mv;}`,
      fragmentShader:`uniform vec3 col;uniform float op;void main(){vec2 uv=gl_PointCoord-.5;float d=length(uv)*2.;float c=smoothstep(.18,.0,d);float h=smoothstep(1.,.18,d)*.3;float a=(c+h)*op;vec3 cc=mix(col*.85,col*1.15,c);gl_FragColor=vec4(cc,a);}`
    }));
  }
  const s1=mkStars(2200,28,.3,.9,0xB8D0E8,.32);
  const s2=mkStars(500,20,.7,1.6,0xDCE8F8,.6);
  const s3=mkStars(70,14,1.3,2.6,0xFFFFFF,.85);
  const s4=mkStars(45,11,1.2,2.2,0x0BBFB8,.88);
  const s5=mkStars(30,10,1.0,2.0,0x4A6FA5,.8);
  scene.add(s1,s2,s3,s4,s5);
  let tx=0,ty=0,cx=0,cy=0;
  document.addEventListener('mousemove',e=>{tx=(e.clientX/window.innerWidth-.5)*.5;ty=(e.clientY/window.innerHeight-.5)*.35;});
  let t=0;
  (function loop(){
    requestAnimationFrame(loop);t+=.005;
    cx+=(tx-cx)*.04;cy+=(ty-cy)*.04;
    s1.rotation.y=t*.004+cx*.12;s2.rotation.y=t*.007+cx*.18;
    s3.rotation.y=t*.011+cx*.25;s4.rotation.y=t*.016+cx*.3;s5.rotation.y=t*.02+cx*.35;
    camera.position.x=cx*.55;camera.position.y=-cy*.38;
    renderer.render(scene,camera);
  })();
  window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
})();

const cdot=document.getElementById('cdot'),cring=document.getElementById('cring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cdot.style.left=mx+'px';cdot.style.top=my+'px';});
(function tick(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;cring.style.left=rx+'px';cring.style.top=ry+'px';requestAnimationFrame(tick);})();
</script>
</body>
</html>
